<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShieldScan — Fake Account Detector</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ═══════════════════════════════════════════════════
       TOKENS — LIGHT & DARK
    ═══════════════════════════════════════════════════ */
    :root {
      --navy:       #1e3a4f;
      --navy-mid:   #2d5f8a;
      --navy-light: #3a7ab8;
      --amber:      #c9923a;
      --gold:       #e8bb7a;
      --gold-lt:    #f2d4a0;

      --real:       #1a6b3c;
      --real-bg:    #e8f5ee;
      --real-glow:  rgba(26,107,60,.2);
      --fake:       #b83232;
      --fake-bg:    #fbeaea;
      --fake-glow:  rgba(184,50,50,.2);
      --warn:       #b86a00;
      --warn-bg:    #fff4e0;
      --warn-glow:  rgba(184,106,0,.18);

      /* Surface */
      --bg:         #edf2f7;
      --bg2:        #e4eaf1;
      --card:       rgba(255,255,255,.78);
      --card-solid: #ffffff;
      --border:     rgba(255,255,255,.6);
      --divide:     rgba(30,58,79,.08);

      /* Text */
      --t1: #1a2e3d;
      --t2: #4a6578;
      --t3: #8da5b4;

      /* Blur & shadow */
      --blur:  20px;
      --sh-sm: 0 2px 8px  rgba(30,58,79,.06);
      --sh-md: 0 8px 28px rgba(30,58,79,.10);
      --sh-lg: 0 24px 60px rgba(30,58,79,.14), 0 4px 14px rgba(30,58,79,.06);

      /* Shape */
      --r:    20px;
      --r-sm: 12px;
      --r-xs: 8px;

      /* Motion */
      --ease:   cubic-bezier(.4,0,.2,1);
      --spring: cubic-bezier(.34,1.56,.64,1);
      --t: .22s;

      /* Skeleton shimmer */
      --sk1: #e2e8f0;
      --sk2: #f1f5f9;

      color-scheme: light;
    }

    [data-theme="dark"] {
      --bg:         #0f1923;
      --bg2:        #162130;
      --card:       rgba(22,33,48,.85);
      --card-solid: #1a2a3d;
      --border:     rgba(255,255,255,.08);
      --divide:     rgba(255,255,255,.06);

      --t1: #e8f0f7;
      --t2: #7fa0b8;
      --t3: #445e72;

      --sh-lg: 0 24px 60px rgba(0,0,0,.4), 0 4px 14px rgba(0,0,0,.25);
      --sh-md: 0 8px 28px rgba(0,0,0,.3);

      --real-bg:  rgba(26,107,60,.18);
      --fake-bg:  rgba(184,50,50,.18);
      --warn-bg:  rgba(184,106,0,.15);

      --sk1: #1e3045;
      --sk2: #243a52;

      color-scheme: dark;
    }

    /* ═══════════════════════════════════════════════════
       RESET
    ═══════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 75% 50% at  7%   3%, rgba(45,95,138,.16) 0%, transparent 55%),
        radial-gradient(ellipse 55% 40% at 94%  97%, rgba(201,146,58,.12) 0%, transparent 52%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 1rem 4rem;
      color: var(--t1);
      overflow-x: hidden;
      transition: background var(--t), color var(--t);
    }

    /* Dot grid */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(circle, rgba(45,95,138,.045) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none; z-index: 0;
    }

    /* ═══════════════════════════════════════════════════
       TOP NAV BAR
    ═══════════════════════════════════════════════════ */
    .navbar {
      position: sticky; top: 0; z-index: 200;
      width: 100%; max-width: 620px;
      display: flex; align-items: center; justify-content: space-between;
      padding: .9rem 0 .8rem;
      margin-bottom: 1.6rem;
      animation: fadeDown .5s var(--ease) both;
    }

    .nav-logo {
      display: flex; align-items: center; gap: .5rem;
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem; font-weight: 700;
      color: var(--navy-mid);
      letter-spacing: -.01em;
    }
    [data-theme="dark"] .nav-logo { color: var(--gold); }

    .nav-logo-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--navy-mid), var(--amber));
      border-radius: 7px;
      display: grid; place-items: center;
      font-size: .85rem; color: #fff;
    }

    .nav-right { display: flex; align-items: center; gap: .6rem; }

    /* History toggle button */
    .btn-history {
      display: flex; align-items: center; gap: .38rem;
      font-family: 'Poppins', sans-serif;
      font-size: .72rem; font-weight: 500;
      color: var(--t2);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: .35rem .85rem;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: color var(--t), background var(--t), transform var(--t), box-shadow var(--t);
    }
    .btn-history:hover { color: var(--t1); transform: translateY(-1px); box-shadow: var(--sh-sm); }

    .history-count {
      background: var(--amber);
      color: #fff;
      font-size: .6rem; font-weight: 700;
      padding: .05rem .38rem;
      border-radius: 100px;
      min-width: 16px; text-align: center;
      display: none;
    }
    .history-count.visible { display: inline-block; }

    /* Dark mode toggle */
    .btn-theme {
      width: 36px; height: 36px;
      display: grid; place-items: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 50%;
      cursor: pointer;
      font-size: .9rem;
      backdrop-filter: blur(8px);
      transition: transform var(--t), box-shadow var(--t), background var(--t);
    }
    .btn-theme:hover { transform: rotate(20deg) scale(1.1); box-shadow: var(--sh-sm); }

    /* ═══════════════════════════════════════════════════
       HEADER
    ═══════════════════════════════════════════════════ */
    .header {
      position: relative; z-index: 1;
      text-align: center;
      margin-bottom: 1.8rem;
      animation: fadeDown .65s var(--ease) .05s both;
    }

    .header-pill {
      display: inline-flex; align-items: center; gap: .42rem;
      font-size: .66rem; font-weight: 600;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--amber);
      background: rgba(201,146,58,.1);
      border: 1px solid rgba(201,146,58,.28);
      padding: .28rem .88rem;
      border-radius: 100px;
      margin-bottom: 1rem;
      backdrop-filter: blur(6px);
    }
    .pulse-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--amber);
      position: relative; flex-shrink: 0;
    }
    .pulse-dot::after {
      content: '';
      position: absolute; inset: -3px;
      border-radius: 50%;
      background: var(--amber);
      opacity: .35;
      animation: pulse-ring 1.8s var(--ease) infinite;
    }

    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 2.85rem);
      font-weight: 700;
      color: var(--t1);
      line-height: 1.12; letter-spacing: -.025em;
      margin-bottom: .6rem;
    }
    .header h1 em {
      font-style: italic;
      background: linear-gradient(115deg, var(--amber), var(--gold) 55%, var(--gold-lt));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .header-sub {
      font-size: .875rem; color: var(--t2);
      font-weight: 300; line-height: 1.8;
      max-width: 370px; margin: 0 auto;
    }

    /* ═══════════════════════════════════════════════════
       MAIN CARD
    ═══════════════════════════════════════════════════ */
    .card {
      position: relative; z-index: 1;
      background: var(--card);
      backdrop-filter: blur(var(--blur));
      -webkit-backdrop-filter: blur(var(--blur));
      border: 1px solid var(--border);
      border-radius: calc(var(--r) + 2px);
      box-shadow: var(--sh-lg);
      width: 100%; max-width: 580px;
      overflow: hidden;
      animation: fadeUp .7s var(--ease) .1s both;
      transition: box-shadow var(--t), border-color var(--t);
    }
    .card:hover { box-shadow: 0 28px 70px rgba(30,58,79,.17), 0 4px 14px rgba(30,58,79,.07); }

    .card-stripe {
      height: 3px;
      background: linear-gradient(90deg, var(--navy), var(--navy-mid) 28%, var(--amber) 60%, var(--gold) 80%, var(--gold-lt));
      background-size: 200% 100%;
      animation: stripe-shimmer 4s linear infinite;
    }

    .card-inner { padding: 2rem 2.4rem 2.4rem; }

    .section-label {
      font-size: .67rem; font-weight: 600;
      letter-spacing: .11em; text-transform: uppercase;
      color: var(--t3);
      margin-bottom: 1.4rem;
      display: flex; align-items: center; gap: .7rem;
    }
    .section-label::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, var(--divide), transparent);
    }

    /* ═══════════════════════════════════════════════════
       FORM GRID
    ═══════════════════════════════════════════════════ */
    .form-grid { display: grid; gap: 1rem; }
    .grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .grid-3col { display: grid; grid-template-columns: repeat(3,1fr); gap: 1rem; }

    @media (max-width: 520px) {
      .grid-2col, .grid-3col { grid-template-columns: 1fr; }
      .card-inner { padding: 1.5rem 1.2rem 2rem; }
    }

    /* ═══════════════════════════════════════════════════
       FIELDS
    ═══════════════════════════════════════════════════ */
    .field { display: flex; flex-direction: column; gap: .3rem; }

    .field label {
      font-size: .67rem; font-weight: 600;
      letter-spacing: .07em; text-transform: uppercase;
      color: var(--t2);
      transition: color var(--t);
    }
    .field:focus-within label { color: var(--navy-mid); }
    [data-theme="dark"] .field:focus-within label { color: var(--gold); }

    .inp-wrap { position: relative; }

    .inp-prefix {
      position: absolute; top: 50%; left: .9rem;
      transform: translateY(-50%);
      font-size: .78rem; color: var(--t3);
      pointer-events: none;
      transition: color var(--t), transform var(--t);
      z-index: 1;
    }
    .inp-wrap:focus-within .inp-prefix {
      color: var(--navy-mid);
      transform: translateY(-50%) scale(1.12);
    }
    [data-theme="dark"] .inp-wrap:focus-within .inp-prefix { color: var(--gold); }

    .field input {
      width: 100%;
      padding: .72rem .9rem .72rem 2.15rem;
      font-family: 'Poppins', sans-serif;
      font-size: .875rem;
      color: var(--t1);
      background: rgba(255,255,255,.5);
      border: 1.5px solid var(--divide);
      border-radius: var(--r-sm);
      outline: none;
      transition: border-color var(--t), box-shadow var(--t), background var(--t);
      -moz-appearance: textfield;
    }
    [data-theme="dark"] .field input {
      background: rgba(15,25,35,.55);
      border-color: rgba(255,255,255,.07);
      color: var(--t1);
    }
    .field input::-webkit-inner-spin-button,
    .field input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .field input::placeholder { color: var(--t3); font-weight: 300; }

    .field input:hover:not(:focus):not(.err-field) {
      border-color: rgba(45,95,138,.25);
    }
    .field input:focus {
      border-color: var(--navy-mid);
      background: rgba(255,255,255,.88);
      box-shadow: 0 0 0 3px rgba(45,95,138,.12), 0 2px 8px rgba(45,95,138,.07);
    }
    [data-theme="dark"] .field input:focus {
      border-color: var(--gold);
      background: rgba(15,25,35,.8);
      box-shadow: 0 0 0 3px rgba(232,187,122,.14);
    }
    .field input.err-field {
      border-color: var(--fake) !important;
      box-shadow: 0 0 0 3px var(--fake-glow) !important;
      animation: shake .32s var(--ease) both;
    }

    .field-err { font-size: .66rem; color: var(--fake); min-height: .85rem; }

    .hdivide {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--divide) 30%, var(--divide) 70%, transparent);
      margin: .1rem 0;
    }

    /* ═══════════════════════════════════════════════════
       SUBMIT BUTTON
    ═══════════════════════════════════════════════════ */
    .btn-main {
      width: 100%; margin-top: .5rem;
      padding: .92rem 1.5rem;
      font-family: 'Poppins', sans-serif;
      font-size: .9rem; font-weight: 600; letter-spacing: .025em;
      color: #fff;
      background: linear-gradient(130deg, var(--navy) 0%, var(--navy-mid) 55%, var(--navy-light) 100%);
      background-size: 200% 100%;
      border: none; border-radius: var(--r-sm);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: .7rem;
      position: relative; overflow: hidden;
      transition: transform .18s var(--spring), box-shadow var(--t), opacity var(--t);
    }

    /* Shimmer sweep on hover */
    .btn-main::before {
      content: '';
      position: absolute; top: 0; left: -100%;
      width: 55%; height: 100%;
      background: linear-gradient(105deg, transparent 20%, rgba(232,187,122,.3) 50%, transparent 80%);
      transition: left .5s var(--ease);
      pointer-events: none;
    }
    .btn-main:hover:not(:disabled)::before { left: 160%; }
    .btn-main::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(130deg, transparent 50%, rgba(232,187,122,.12));
      pointer-events: none;
    }

    .btn-main:hover:not(:disabled) {
      transform: translateY(-3px) scale(1.006);
      box-shadow: 0 14px 36px rgba(30,58,79,.3), 0 0 0 1px rgba(45,95,138,.12);
    }
    .btn-main:active:not(:disabled) {
      transform: translateY(-1px) scale(1);
      box-shadow: 0 5px 14px rgba(30,58,79,.18);
      transition-duration: .08s;
    }
    .btn-main:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    /* Tri-color spinner */
    .btn-spinner {
      display: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 2.5px solid rgba(255,255,255,.2);
      border-top-color: #fff;
      border-right-color: rgba(255,255,255,.55);
      animation: spin .65s linear infinite;
      flex-shrink: 0;
    }
    .btn-main.loading .btn-label { opacity: .35; }
    .btn-main.loading .btn-spinner { display: block; }

    /* ═══════════════════════════════════════════════════
       SKELETON LOADER
    ═══════════════════════════════════════════════════ */
    .skeleton-wrap {
      position: relative; z-index: 1;
      width: 100%; max-width: 580px;
      margin-top: 1rem;
      display: none;
    }
    .skeleton-wrap.show { display: block; animation: fadeUp .3s var(--ease) both; }

    .skeleton-card {
      background: var(--card);
      backdrop-filter: blur(var(--blur));
      border: 1px solid var(--border);
      border-radius: var(--r);
      box-shadow: var(--sh-md);
      padding: 1.6rem 2rem 1.8rem;
      overflow: hidden;
    }

    .sk-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.4rem; }
    .sk-box { border-radius: 14px; }
    .sk-icon { width: 52px; height: 52px; flex-shrink: 0; }
    .sk-lines { flex: 1; display: flex; flex-direction: column; gap: .5rem; }
    .sk-line { height: 12px; border-radius: 6px; }
    .sk-line-lg { width: 45%; }
    .sk-line-sm { width: 65%; }
    .sk-bar-wrap { margin-bottom: 1.2rem; }
    .sk-label-row { display: flex; justify-content: space-between; margin-bottom: .5rem; }
    .sk-label { height: 10px; border-radius: 5px; }
    .sk-label-l { width: 22%; }
    .sk-label-r { width: 10%; }
    .sk-track { height: 8px; border-radius: 100px; }
    .sk-chips { display: flex; gap: .42rem; flex-wrap: wrap; }
    .sk-chip { height: 22px; border-radius: 100px; }

    /* Shimmer animation on all sk- elements */
    .sk-box, .sk-line, .sk-label, .sk-track, .sk-chip {
      background: linear-gradient(90deg, var(--sk1) 25%, var(--sk2) 50%, var(--sk1) 75%);
      background-size: 400% 100%;
      animation: sk-shimmer 1.4s ease infinite;
    }
    .sk-line-sm    { animation-delay: .1s; }
    .sk-label-r    { animation-delay: .05s; }
    .sk-track      { animation-delay: .12s; }
    .sk-chip:nth-child(2) { animation-delay: .08s; width: 90px; }
    .sk-chip:nth-child(3) { animation-delay: .16s; width: 75px; }
    .sk-chip:nth-child(4) { animation-delay: .05s; width: 60px; }
    .sk-chip:nth-child(5) { animation-delay: .2s;  width: 80px; }
    .sk-chip:first-child  { width: 70px; }

    /* ═══════════════════════════════════════════════════
       RESULT CARD
    ═══════════════════════════════════════════════════ */
    .result-wrap {
      position: relative; z-index: 1;
      width: 100%; max-width: 580px;
      margin-top: 1rem;
      display: none;
    }
    .result-wrap.show { display: block; animation: resultEntrance .5s var(--spring) both; }

    .result-card {
      background: var(--card);
      backdrop-filter: blur(var(--blur));
      -webkit-backdrop-filter: blur(var(--blur));
      border: 1px solid var(--border);
      border-radius: var(--r);
      box-shadow: var(--sh-md);
      overflow: hidden;
      transition: box-shadow var(--t);
    }
    .result-card:hover { box-shadow: var(--sh-lg); }

    .r-stripe { height: 3px; }
    .r-stripe.real { background: linear-gradient(90deg, #15803d, #22c55e, #4ade80); }
    .r-stripe.fake { background: linear-gradient(90deg, #991b1b, #ef4444, #f87171); }
    .r-stripe.warn { background: linear-gradient(90deg, #92400e, #d97706, #fbbf24); }

    .r-body { padding: 1.5rem 2rem 1.8rem; }

    /* Gauge + verdict side by side */
    .r-top {
      display: flex; align-items: center; gap: 1.4rem;
      margin-bottom: 1.4rem;
    }

    /* ── SVG Gauge ── */
    .gauge-wrap { flex-shrink: 0; position: relative; width: 88px; height: 52px; }
    .gauge-wrap svg { width: 88px; height: 52px; overflow: visible; }

    .gauge-bg { fill: none; stroke: var(--divide); stroke-width: 6; stroke-linecap: round; }
    .gauge-fill {
      fill: none; stroke-width: 6; stroke-linecap: round;
      stroke-dasharray: 138; stroke-dashoffset: 138;
      transition: stroke-dashoffset 1s cubic-bezier(.4,0,.2,1) .3s, stroke .4s;
    }
    .gauge-label {
      position: absolute; bottom: -2px; left: 50%; transform: translateX(-50%);
      font-size: .7rem; font-weight: 700; color: var(--t2);
      white-space: nowrap; letter-spacing: .01em;
    }

    /* Verdict text */
    .r-verdict-text { flex: 1; min-width: 0; }
    .r-verdict-row { display: flex; align-items: center; gap: .65rem; margin-bottom: .28rem; }

    .r-icon {
      width: 36px; height: 36px; border-radius: 10px;
      display: grid; place-items: center;
      font-size: 1rem; flex-shrink: 0;
      transition: transform .2s var(--spring);
      animation: iconPop .5s var(--spring) .15s both;
    }
    .r-icon:hover { transform: scale(1.1) rotate(-4deg); }
    .r-icon.real { background: var(--real-bg); color: var(--real); box-shadow: 0 4px 12px var(--real-glow); }
    .r-icon.fake { background: var(--fake-bg); color: var(--fake); box-shadow: 0 4px 12px var(--fake-glow); }
    .r-icon.warn { background: var(--warn-bg); color: var(--warn); box-shadow: 0 4px 12px var(--warn-glow); }

    .r-label {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem; font-weight: 700;
      animation: fadeLeft .4s var(--ease) .2s both;
    }
    .r-label.real { color: var(--real); }
    .r-label.fake { color: var(--fake); }
    .r-label.warn { color: var(--warn); }

    .r-sublabel {
      font-size: .73rem; color: var(--t3);
      animation: fadeLeft .4s var(--ease) .28s both;
    }

    /* Confidence bar */
    .conf-header {
      display: flex; justify-content: space-between;
      font-size: .73rem; color: var(--t2);
      margin-bottom: .48rem;
      animation: fadeLeft .4s var(--ease) .32s both;
    }
    .conf-pct { font-weight: 600; color: var(--t1); }
    .conf-track {
      height: 8px; background: var(--divide);
      border-radius: 100px; overflow: hidden;
      margin-bottom: 1.2rem;
      animation: fadeLeft .4s var(--ease) .32s both;
    }
    .conf-bar {
      height: 100%; width: 0%; border-radius: 100px;
      transition: width .95s cubic-bezier(.4,0,.2,1) .38s;
    }
    .conf-bar.real { background: linear-gradient(90deg,#15803d,#22c55e); box-shadow: 0 0 8px rgba(34,197,94,.35); }
    .conf-bar.fake { background: linear-gradient(90deg,#991b1b,#ef4444); box-shadow: 0 0 8px rgba(239,68,68,.35); }
    .conf-bar.warn { background: linear-gradient(90deg,#92400e,#f59e0b); box-shadow: 0 0 8px rgba(245,158,11,.3); }

    /* Chips */
    .chips {
      display: flex; flex-wrap: wrap; gap: .42rem;
      animation: fadeLeft .4s var(--ease) .42s both;
    }
    .chip {
      font-size: .67rem; color: var(--t2);
      background: rgba(255,255,255,.45);
      border: 1px solid var(--divide);
      border-radius: 100px; padding: .22rem .72rem;
      transition: background var(--t), border-color var(--t), transform var(--t);
      cursor: default;
    }
    [data-theme="dark"] .chip { background: rgba(255,255,255,.05); }
    .chip:hover {
      background: rgba(255,255,255,.75);
      border-color: rgba(45,95,138,.2);
      transform: translateY(-1px);
    }
    [data-theme="dark"] .chip:hover { background: rgba(255,255,255,.1); }

    /* ═══════════════════════════════════════════════════
       HISTORY DRAWER
    ═══════════════════════════════════════════════════ */
    .drawer-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(15,25,35,.4);
      backdrop-filter: blur(4px);
      opacity: 0; pointer-events: none;
      transition: opacity .28s var(--ease);
    }
    .drawer-overlay.open { opacity: 1; pointer-events: auto; }

    .drawer {
      position: fixed; top: 0; right: -360px; bottom: 0; z-index: 400;
      width: 340px; max-width: 92vw;
      background: var(--card-solid);
      border-left: 1px solid var(--divide);
      box-shadow: -8px 0 40px rgba(0,0,0,.18);
      display: flex; flex-direction: column;
      transition: right .32s var(--ease);
      backdrop-filter: blur(var(--blur));
    }
    .drawer.open { right: 0; }

    .drawer-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 1.4rem 1rem;
      border-bottom: 1px solid var(--divide);
      flex-shrink: 0;
    }
    .drawer-title {
      font-family: 'Playfair Display', serif;
      font-size: 1rem; font-weight: 700; color: var(--t1);
    }
    .btn-close-drawer {
      width: 30px; height: 30px;
      display: grid; place-items: center;
      background: var(--divide);
      border: none; border-radius: 50%;
      cursor: pointer; font-size: .8rem; color: var(--t2);
      transition: background var(--t), transform var(--t);
    }
    .btn-close-drawer:hover { background: var(--fake-bg); color: var(--fake); transform: rotate(90deg); }

    .drawer-body { flex: 1; overflow-y: auto; padding: .8rem 1rem; }

    .drawer-empty {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%;
      color: var(--t3); font-size: .82rem; gap: .6rem; text-align: center;
      padding: 2rem;
    }
    .drawer-empty-icon { font-size: 2.2rem; opacity: .5; }

    .history-item {
      display: flex; align-items: center; gap: .75rem;
      padding: .75rem .85rem;
      border-radius: var(--r-sm);
      border: 1px solid var(--divide);
      margin-bottom: .55rem;
      background: rgba(255,255,255,.35);
      transition: background var(--t), transform var(--t), box-shadow var(--t);
      cursor: default;
      animation: fadeLeft .3s var(--ease) both;
    }
    [data-theme="dark"] .history-item { background: rgba(255,255,255,.04); }
    .history-item:hover { background: rgba(255,255,255,.65); transform: translateX(2px); box-shadow: var(--sh-sm); }
    [data-theme="dark"] .history-item:hover { background: rgba(255,255,255,.08); }

    .hi-badge {
      width: 32px; height: 32px; border-radius: 9px;
      display: grid; place-items: center;
      font-size: .85rem; flex-shrink: 0;
    }
    .hi-badge.real { background: var(--real-bg); color: var(--real); }
    .hi-badge.fake { background: var(--fake-bg); color: var(--fake); }
    .hi-badge.warn { background: var(--warn-bg); color: var(--warn); }

    .hi-info { flex: 1; min-width: 0; }
    .hi-username { font-size: .8rem; font-weight: 600; color: var(--t1); truncate: ellipsis; white-space: nowrap; overflow: hidden; }
    .hi-meta { font-size: .68rem; color: var(--t3); margin-top: .1rem; }

    .hi-conf {
      font-size: .72rem; font-weight: 700;
      padding: .18rem .55rem; border-radius: 100px;
    }
    .hi-conf.real { color: var(--real); background: var(--real-bg); }
    .hi-conf.fake { color: var(--fake); background: var(--fake-bg); }
    .hi-conf.warn { color: var(--warn); background: var(--warn-bg); }

    .drawer-footer {
      padding: .8rem 1rem 1rem;
      border-top: 1px solid var(--divide);
      flex-shrink: 0;
    }
    .btn-clear {
      width: 100%;
      font-family: 'Poppins', sans-serif;
      font-size: .75rem; font-weight: 500;
      color: var(--fake); background: var(--fake-bg);
      border: 1px solid rgba(184,50,50,.2);
      border-radius: var(--r-xs); padding: .55rem;
      cursor: pointer;
      transition: background var(--t), transform var(--t);
    }
    .btn-clear:hover { background: rgba(184,50,50,.15); transform: translateY(-1px); }

    /* ═══════════════════════════════════════════════════
       TOAST
    ═══════════════════════════════════════════════════ */
    .toast {
      position: fixed; bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(16px);
      font-size: .8rem; font-family: 'Poppins', sans-serif;
      padding: .72rem 1.35rem;
      border-radius: 100px;
      display: flex; align-items: center; gap: .55rem;
      opacity: 0; pointer-events: none;
      transition: opacity .28s var(--ease), transform .28s var(--spring);
      z-index: 999;
      white-space: nowrap; max-width: 90vw;
      background: rgba(30,58,79,.9);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,.1);
      color: #fff;
      box-shadow: 0 8px 28px rgba(0,0,0,.22);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
    .toast.error-toast { background: rgba(184,50,50,.92); }

    /* ═══════════════════════════════════════════════════
       FOOTER
    ═══════════════════════════════════════════════════ */
    .footer {
      position: relative; z-index: 1;
      margin-top: 2rem; font-size: .7rem;
      color: var(--t3); text-align: center;
      animation: fadeUp 1s var(--ease) .3s both;
    }
    .footer a { color: var(--amber); text-decoration: none; transition: opacity var(--t); }
    .footer a:hover { opacity: .7; text-decoration: underline; }

    /* ═══════════════════════════════════════════════════
       KEYFRAMES
    ═══════════════════════════════════════════════════ */
    @keyframes fadeDown  { from{opacity:0;transform:translateY(-18px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeUp    { from{opacity:0;transform:translateY(18px)}  to{opacity:1;transform:translateY(0)} }
    @keyframes fadeLeft  { from{opacity:0;transform:translateX(-10px)} to{opacity:1;transform:translateX(0)} }
    @keyframes resultEntrance { from{opacity:0;transform:translateY(14px) scale(.97)} to{opacity:1;transform:translateY(0) scale(1)} }
    @keyframes iconPop   { from{opacity:0;transform:scale(.3)} to{opacity:1;transform:scale(1)} }
    @keyframes spin      { to{transform:rotate(360deg)} }
    @keyframes pulse-ring{ 0%{transform:scale(1);opacity:.35} 70%{transform:scale(2.4);opacity:0} 100%{transform:scale(2.4);opacity:0} }
    @keyframes stripe-shimmer { 0%{background-position:0% 0} 100%{background-position:200% 0} }
    @keyframes sk-shimmer{ 0%{background-position:100% 50%} 100%{background-position:0% 50%} }
    @keyframes shake     { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }

    @media (prefers-reduced-motion:reduce) {
      *,*::before,*::after { animation-duration:.01ms!important; transition-duration:.01ms!important; }
    }
  </style>
</head>
<body>

  <!-- ── History Drawer ─────────────────── -->
  <div class="drawer-overlay" id="drawerOverlay"></div>
  <aside class="drawer" id="historyDrawer" aria-label="Prediction history">
    <div class="drawer-header">
      <span class="drawer-title">Recent Checks</span>
      <button class="btn-close-drawer" id="btnCloseDrawer" aria-label="Close">✕</button>
    </div>
    <div class="drawer-body" id="drawerBody">
      <div class="drawer-empty" id="drawerEmpty">
        <span class="drawer-empty-icon">🔍</span>
        <span>No checks yet.<br/>Results will appear here.</span>
      </div>
    </div>
    <div class="drawer-footer">
      <button class="btn-clear" id="btnClearHistory">Clear History</button>
    </div>
  </aside>

  <!-- ── Navbar ─────────────────────────── -->
  <nav class="navbar">
    <div class="nav-logo">
      <div class="nav-logo-icon">⬡</div>
      ShieldScan
    </div>
    <div class="nav-right">
      <button class="btn-history" id="btnHistory" aria-label="View history">
        🕓 History
        <span class="history-count" id="historyCount">0</span>
      </button>
      <button class="btn-theme" id="btnTheme" aria-label="Toggle dark mode" title="Toggle dark mode">🌙</button>
    </div>
  </nav>

  <!-- ── Header ─────────────────────────── -->
  <header class="header">
    <div class="header-pill">
      <span class="pulse-dot"></span>
      AI · ML Powered
    </div>
    <h1>Fake Account<br /><em>Detector</em></h1>
    <p class="header-sub">
      Enter a social profile's data below.<br/>
      Get an authenticity verdict in under a second.
    </p>
  </header>

  <!-- ── Form Card ─────────────────────── -->
  <div class="card">
    <div class="card-stripe"></div>
    <div class="card-inner">
      <p class="section-label">Profile Data</p>
      <form id="mainForm" novalidate>
        <div class="form-grid">

          <div class="grid-2col">
            <div class="field">
              <label for="username">Username</label>
              <div class="inp-wrap">
                <span class="inp-prefix">@</span>
                <input type="text" id="username" placeholder="john_doe123" autocomplete="off" />
              </div>
              <span class="field-err" id="e-username"></span>
            </div>
            <div class="field">
              <label for="bio">Bio</label>
              <div class="inp-wrap">
                <span class="inp-prefix">✦</span>
                <input type="text" id="bio" placeholder="Optional bio" autocomplete="off" />
              </div>
            </div>
          </div>

          <div class="hdivide"></div>

          <div class="grid-3col">
            <div class="field">
              <label for="followers">Followers</label>
              <div class="inp-wrap">
                <span class="inp-prefix">↓</span>
                <input type="number" id="followers" placeholder="0" min="0" />
              </div>
              <span class="field-err" id="e-followers"></span>
            </div>
            <div class="field">
              <label for="following">Following</label>
              <div class="inp-wrap">
                <span class="inp-prefix">↑</span>
                <input type="number" id="following" placeholder="0" min="0" />
              </div>
              <span class="field-err" id="e-following"></span>
            </div>
            <div class="field">
              <label for="posts">Posts</label>
              <div class="inp-wrap">
                <span class="inp-prefix">#</span>
                <input type="number" id="posts" placeholder="0" min="0" />
              </div>
              <span class="field-err" id="e-posts"></span>
            </div>
          </div>

          <button type="submit" class="btn-main" id="submitBtn">
            <span class="btn-label">Analyse Account</span>
            <span class="btn-spinner"></span>
          </button>

        </div>
      </form>
    </div>
  </div>

  <!-- ── Skeleton Loader ───────────────── -->
  <div class="skeleton-wrap" id="skeletonWrap">
    <div class="skeleton-card">
      <div class="sk-row">
        <div class="sk-box sk-icon"></div>
        <div class="sk-lines">
          <div class="sk-line sk-line-lg"></div>
          <div class="sk-line sk-line-sm"></div>
        </div>
      </div>
      <div class="sk-bar-wrap">
        <div class="sk-label-row">
          <div class="sk-label sk-label-l"></div>
          <div class="sk-label sk-label-r"></div>
        </div>
        <div class="sk-track" style="width:100%"></div>
      </div>
      <div class="sk-chips">
        <div class="sk-chip"></div>
        <div class="sk-chip"></div>
        <div class="sk-chip"></div>
        <div class="sk-chip"></div>
        <div class="sk-chip"></div>
      </div>
    </div>
  </div>

  <!-- ── Result Card ───────────────────── -->
  <div class="result-wrap" id="resultWrap">
    <div class="result-card">
      <div class="r-stripe" id="rStripe"></div>
      <div class="r-body">

        <div class="r-top">
          <!-- SVG Gauge -->
          <div class="gauge-wrap">
            <svg viewBox="0 0 88 52">
              <!-- Half-circle track -->
              <path class="gauge-bg"
                d="M8,48 A36,36 0 0,1 80,48"
                stroke-dasharray="none" />
              <!-- Animated fill arc -->
              <path class="gauge-fill" id="gaugeFill"
                d="M8,48 A36,36 0 0,1 80,48" />
            </svg>
            <span class="gauge-label" id="gaugeLabel">0%</span>
          </div>

          <!-- Verdict text -->
          <div class="r-verdict-text">
            <div class="r-verdict-row">
              <div class="r-icon" id="rIcon"></div>
              <div class="r-label" id="rLabel"></div>
            </div>
            <div class="r-sublabel" id="rSub"></div>
          </div>
        </div>

        <div class="conf-header">
          <span>Confidence Score</span>
          <span class="conf-pct" id="rPct"></span>
        </div>
        <div class="conf-track">
          <div class="conf-bar" id="rBar"></div>
        </div>
        <div class="chips" id="rChips"></div>
      </div>
    </div>
  </div>

  <!-- ── Toast ─────────────────────────── -->
  <div class="toast" id="toast" role="alert">
    <span id="toastIcon"></span>
    <span id="toastText"></span>
  </div>

  <!-- ── Footer ────────────────────────── -->
  <footer class="footer">
    Powered by Flask · scikit-learn &nbsp;·&nbsp; <a href="#">GitHub</a>
  </footer>

  <script src="app.js"></script>
  <script>
  /* ── UI Polish enhancements (self-contained, no app.js changes needed) ── */
  (function () {

    /* ── Dark mode ──────────────────────────────────────────── */
    const html    = document.documentElement;
    const btnTheme = document.getElementById('btnTheme');
    const saved   = localStorage.getItem('theme') || 'light';
    setTheme(saved);

    btnTheme.addEventListener('click', () => {
      setTheme(html.dataset.theme === 'dark' ? 'light' : 'dark');
    });

    function setTheme(t) {
      html.dataset.theme    = t;
      btnTheme.textContent  = t === 'dark' ? '☀️' : '🌙';
      btnTheme.title        = t === 'dark' ? 'Switch to light mode' : 'Switch to dark mode';
      localStorage.setItem('theme', t);
    }

    /* ── History drawer ─────────────────────────────────────── */
    const overlay     = document.getElementById('drawerOverlay');
    const drawer      = document.getElementById('historyDrawer');
    const drawerBody  = document.getElementById('drawerBody');
    const drawerEmpty = document.getElementById('drawerEmpty');
    const histCount   = document.getElementById('historyCount');
    const btnHistory  = document.getElementById('btnHistory');
    const btnClose    = document.getElementById('btnCloseDrawer');
    const btnClear    = document.getElementById('btnClearHistory');

    let history = JSON.parse(sessionStorage.getItem('shieldscan_history') || '[]');
    renderHistory();

    btnHistory.addEventListener('click', openDrawer);
    overlay.addEventListener('click', closeDrawer);
    btnClose.addEventListener('click', closeDrawer);
    btnClear.addEventListener('click', () => {
      history = []; persist(); renderHistory();
    });

    function openDrawer()  { drawer.classList.add('open'); overlay.classList.add('open'); }
    function closeDrawer() { drawer.classList.remove('open'); overlay.classList.remove('open'); }
    function persist()     { sessionStorage.setItem('shieldscan_history', JSON.stringify(history)); }

    function renderHistory() {
      const count = history.length;
      histCount.textContent = count;
      histCount.classList.toggle('visible', count > 0);

      // Remove old items (keep empty message in DOM)
      drawerBody.querySelectorAll('.history-item').forEach(el => el.remove());

      if (count === 0) {
        drawerEmpty.style.display = '';
        return;
      }
      drawerEmpty.style.display = 'none';

      [...history].reverse().forEach((item, i) => {
        const el = document.createElement('div');
        el.className = 'history-item';
        el.style.animationDelay = `${i * 0.04}s`;

        const cls = item.cls;
        const label = cls === 'warn' ? 'Uncertain' : (cls === 'real' ? 'Real' : 'Fake');
        const icon  = cls === 'real' ? '✓' : (cls === 'warn' ? '?' : '✕');

        el.innerHTML = `
          <div class="hi-badge ${cls}">${icon}</div>
          <div class="hi-info">
            <div class="hi-username">@${escHtml(item.username)}</div>
            <div class="hi-meta">${item.followers.toLocaleString()} followers · ${item.time}</div>
          </div>
          <span class="hi-conf ${cls}">${item.confidence}%</span>
        `;
        drawerBody.appendChild(el);
      });
    }

    /* ── Gauge SVG helper ───────────────────────────────────── */
    // Arc circumference for M8,48 A36,36 0 0,1 80,48 ≈ π×36 ≈ 113.1
    // We use 113 as dasharray length
    const GAUGE_LEN = 113;
    const gaugeFill  = document.getElementById('gaugeFill');
    const gaugeLabel = document.getElementById('gaugeLabel');

    function setGauge(pct, cls) {
      const offset = GAUGE_LEN - (pct / 100) * GAUGE_LEN;
      gaugeFill.style.strokeDasharray  = GAUGE_LEN;
      gaugeFill.style.strokeDashoffset = GAUGE_LEN; // reset first
      gaugeFill.setAttribute('stroke',
        cls === 'real' ? '#22c55e' : cls === 'fake' ? '#ef4444' : '#f59e0b'
      );
      requestAnimationFrame(() => requestAnimationFrame(() => {
        gaugeFill.style.strokeDashoffset = offset;
        gaugeLabel.textContent = pct.toFixed(1) + '%';
      }));
    }

    /* ── Contextual button label ────────────────────────────── */
    const submitBtn  = document.getElementById('submitBtn');
    const btnLabel   = submitBtn.querySelector('.btn-label');
    const defaultLbl = 'Analyse Account';

    /* Intercept the app.js loading state to change button copy */
    const _origDisabled = Object.getOwnPropertyDescriptor(HTMLButtonElement.prototype, 'disabled');
    new MutationObserver(() => {
      if (submitBtn.classList.contains('loading')) {
        btnLabel.textContent = 'Analysing…';
      } else if (submitBtn.dataset.done === 'success') {
        btnLabel.textContent = '✓ Done — Run Again';
        setTimeout(() => {
          btnLabel.textContent = defaultLbl;
          delete submitBtn.dataset.done;
        }, 3000);
      } else if (submitBtn.dataset.done === 'error') {
        btnLabel.textContent = 'Try Again';
        setTimeout(() => {
          btnLabel.textContent = defaultLbl;
          delete submitBtn.dataset.done;
        }, 3000);
      } else {
        if (!['✓ Done — Run Again','Try Again'].includes(btnLabel.textContent)) {
          btnLabel.textContent = defaultLbl;
        }
      }
    }).observe(submitBtn, { attributes: true, attributeFilter: ['class','disabled'] });

    /* ── Patch app.js showResult to drive gauge + history ───── */
    const resultWrap   = document.getElementById('resultWrap');
    const skeletonWrap = document.getElementById('skeletonWrap');

    /* Intercept result rendering via MutationObserver on result-wrap */
    new MutationObserver(mutations => {
      mutations.forEach(m => {
        if (m.attributeName === 'class') {
          if (resultWrap.classList.contains('show')) {
            const rLabel = document.getElementById('rLabel');
            const rPct   = document.getElementById('rPct');
            const cls    = rLabel.className.replace('r-label','').trim();
            const pct    = parseFloat(rPct.textContent);

            // Drive gauge
            if (!isNaN(pct)) setGauge(pct, cls);

            // Log to history
            const username = document.getElementById('username').value.trim() || 'unknown';
            const followers = parseInt(document.getElementById('followers').value) || 0;
            const now = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            history.unshift({ username, followers, confidence: pct.toFixed(1), cls, time: now });
            if (history.length > 20) history.pop();
            persist(); renderHistory();

            // Mark button done
            submitBtn.dataset.done = 'success';
          }
        }
      });
    }).observe(resultWrap, { attributes: true });

    /* Watch skeleton to sync with loading state */
    new MutationObserver(() => {
      if (submitBtn.classList.contains('loading')) {
        skeletonWrap.classList.add('show');
        resultWrap.classList.remove('show');
      } else {
        skeletonWrap.classList.remove('show');
      }
    }).observe(submitBtn, { attributes: true, attributeFilter: ['class'] });

    /* ── Escape helper ───────────────────────────────────────── */
    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

  })();
  </script>
</body>
</html>
